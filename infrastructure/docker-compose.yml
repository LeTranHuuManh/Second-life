version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: secondlife-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: secondlife
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: secondlife-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: secondlife-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  mongo_data:
